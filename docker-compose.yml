services:
  postgres:
    image: postgres:16-alpine
    container_name: ganaderia-postgres
    environment:
      POSTGRES_USER: ganaderia
      POSTGRES_PASSWORD: ganaderia_dev
      POSTGRES_DB: ganaderia_ph
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ganaderia -d ganaderia_ph"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: ganaderia-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  postgres_data:
  redis_data:
